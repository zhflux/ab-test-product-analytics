name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
      - name: Run tests with coverage
        run: python -m pytest --cov=pipeline --cov=notebooks -v
      - name: Generate test data for validation
        run: python pipeline/ingest.py --seed 2026 --num-users 500
      - name: Run data quality checks
        run: python -c "
          import pandas as pd
          from pipeline.data_validation import run_data_quality_checks, print_validation_report
          df = pd.read_csv('data/raw_ab_test_events.csv')
          results = run_data_quality_checks(df)
          print_validation_report(results)
          assert results['events_validation']['is_valid'], 'Data validation failed'
        "
